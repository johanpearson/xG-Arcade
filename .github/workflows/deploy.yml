name: deploy

# TIER 0 (see MVP-SCOPE.md): there is no "prod" yet — this deploys to the
# single environment Tier 0 actually has, which uses the DEV_* secrets and
# xg-arcade-dev-rg naming (reused from the environment-split design in
# ADR-0006/ADR-0009, built ahead of when it's needed). This is the
# environment you play on and test manually.
#
# TIER 1 evolution: when a real "prod" is created (the backup/alerting/
# legal-docs bright line in MVP-SCOPE.md — i.e. before any user besides
# you exists), this workflow gets a second job deploying to
# PROD_*/xg-arcade-prod-rg, and this job's trigger likely narrows to a
# manual promotion step rather than every push to main. Don't add that
# job before the bright line is actually crossed.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  id-token: write   # for Azure OIDC login
  contents: read
  packages: write    # for pushing to GHCR

jobs:
  build-and-push-backend:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v7
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        id: meta
        run: |
          # GHCR/Docker image names must be all-lowercase — github.repository
          # ("johanpearson/xG-Arcade") isn't, so build the tag from a
          # lowercased copy rather than the raw repository name.
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${REPO_LOWER}-api:${{ github.sha }}"
          docker build -t "$IMAGE" -f backend/Dockerfile backend
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  deploy-infra:
    runs-on: ubuntu-latest
    needs: build-and-push-backend
    steps:
      - uses: actions/checkout@v7
      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy Bicep (Tier 0's one environment — dev naming)
        # corsAllowedOrigin is blank until DEV_FRONTEND_HOSTNAME is filled in
        # post-first-deploy (infra/README.md) — same chicken-and-egg shape as
        # DEV_BACKEND_HOSTNAME/the static web app token. Blank means CORS
        # allows nothing, which is safe (not a functional break) until then.
        #
        # registryPassword uses GHCR_TOKEN (a long-lived PAT), never
        # GITHUB_TOKEN — GITHUB_TOKEN is scoped to this workflow run and
        # expires shortly after it finishes, but the Container App (scale-to-
        # zero, minReplicas: 0) needs to re-pull and re-authenticate to GHCR
        # on every cold start, which can happen long after this run ends.
        # Using GITHUB_TOKEN here deploys fine but then fails with
        # ImagePullBackOff on the app's first cold start after the token
        # expires (found via NOTES.md, S-002 first real deploy).
        run: |
          CORS_ORIGIN=""
          if [ -n "${{ secrets.DEV_FRONTEND_HOSTNAME }}" ]; then
            CORS_ORIGIN="https://${{ secrets.DEV_FRONTEND_HOSTNAME }}"
          fi
          az deployment group create \
            --resource-group ${{ secrets.DEV_AZURE_RESOURCE_GROUP }} \
            --template-file infra/bicep/main.bicep \
            --parameters infra/bicep/main.parameters.dev.json \
            --parameters containerImage=${{ needs.build-and-push-backend.outputs.image }} \
                         registryUsername=${{ github.actor }} \
                         registryPassword=${{ secrets.GHCR_TOKEN }} \
                         databaseConnectionString=${{ secrets.DEV_DATABASE_CONNECTION_STRING }} \
                         supabaseJwtSecret=${{ secrets.DEV_SUPABASE_JWT_SECRET }} \
                         supabaseUrl=${{ secrets.DEV_SUPABASE_URL }} \
                         supabaseAnonKey=${{ secrets.DEV_SUPABASE_ANON_KEY }} \
                         corsAllowedOrigin="$CORS_ORIGIN"

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Deploy to Azure Static Web Apps (Tier 0's one environment)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.DEV_AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "frontend"
          output_location: "dist"
        env:
          # Same blank-until-first-deploy shape as deploy-infra's CORS origin
          # (DEV_BACKEND_HOSTNAME is itself a post-deploy secret) — passed
          # through to the Oryx build the action runs internally, so Vite
          # bakes it into the built bundle as import.meta.env.VITE_API_BASE_URL.
          # Blank means the deployed frontend calls its own origin instead of
          # the API and /health won't resolve, same as an unset CORS origin
          # means the API rejects the frontend — both need this secret set to
          # actually work end-to-end, not just to deploy without erroring.
          VITE_API_BASE_URL: ${{ secrets.DEV_BACKEND_HOSTNAME && format('https://{0}', secrets.DEV_BACKEND_HOSTNAME) || '' }}
