name: generate-round

# Creates a new Round + game instance per the configured frequency (REQ-301).
# S-008 (docs/backlog.md): Core.Rounds' RoundGenerationService now backs
# /internal/generate-round, so this cron is enabled.
#
# This cron's cadence and XGArcade.Api/Program.cs's RoundSchedulingOptions.
# RoundDuration are coupled, not independent settings — RoundDuration must
# be at least as long as the longest gap between two consecutive firings
# below (Tue+Fri weekly: Fri->Tue is 4 days, the longer of the two
# alternating gaps), or a round can fully close before the next scheduled
# run ever generates its successor, recreating the exact "dead app" gap
# REQ-301 exists to prevent — just via misconfiguration instead of a
# failure. See NOTES.md for the full derivation. Change the two together.

on:
  schedule:
    - cron: "0 6 * * 2,5" # Tue+Fri 06:00 UTC
  workflow_dispatch: {}

jobs:
  generate-round:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger round generation
        run: |
          http_status=$(curl -sS -o response.json -w "%{http_code}" -X POST \
            "https://${{ secrets.DEV_BACKEND_HOSTNAME }}/internal/generate-round" \
            -H "Authorization: Bearer ${{ secrets.INTERNAL_JOB_TOKEN }}")

          echo "Response body:"
          cat response.json

          if [ "$http_status" -ge 400 ]; then
            echo "::error::/internal/generate-round returned HTTP $http_status"
            exit 1
          fi
