name: ci

# Tier 0 shape (see MVP-SCOPE.md): one environment (dev), so E2E runs
# against a LOCAL stack composed inside this workflow — a Postgres service
# container + the API run from source + the frontend dev server. No cloud
# dev environment, no test-data API, no DEV_* secrets needed.
#
# Tier 1 evolution (when the dev environment exists, ADR-0006): add back a
# `deploy-dev` job (build/push dev image, deploy Bicep with DEV_* secrets)
# and point an additional E2E run at the deployed dev env with the
# test-data reset call (REQ-802). That version is preserved in git history
# and described in infra/README.md — don't reintroduce it before Tier 1.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# dorny/test-reporter (all three jobs below) publishes a per-job Checks-tab
# report from each test run's output file, so pass/fail/new/removed tests
# are visible without opening logs — needs checks: write to create it.
permissions:
  contents: read
  checks: write

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet restore backend/XGArcade.sln
      - run: dotnet build backend/XGArcade.sln --no-restore --configuration Release
      - run: dotnet test backend/XGArcade.sln --no-build --configuration Release --logger "trx"
      - name: Publish backend test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Backend test results
          path: "backend/**/TestResults/*.trx"
          reporter: dotnet-trx
          # false: publish as its own Checks-tab entry (visible directly on
          # the PR) instead of dorny's default of a job-summary-only report,
          # which only shows up buried in the specific workflow run's page.
          use-actions-summary: false

  frontend-unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test
      - name: Publish frontend unit test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Frontend unit test results
          path: "frontend/test-results/vitest-junit.xml"
          reporter: java-junit
          use-actions-summary: false

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-unit-tests]
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: xgarcade_e2e
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Get installed Playwright version
        id: playwright-version
        working-directory: frontend
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      - name: Install Playwright's Chromium (+ OS deps)
        working-directory: frontend
        # Only chromium — playwright.config.ts doesn't run firefox/webkit
        # projects, so installing them would just be wasted download time.
        # --with-deps always reinstalls OS packages even on a browser-binary
        # cache hit (these runners are fresh VMs each run, so apt state
        # never persists) — but `playwright install` itself skips the slow
        # binary download once the cached version already matches, which is
        # most of what made this step slow.
        run: npx playwright install --with-deps chromium
      - name: Migrate + seed local database
        run: dotnet run --project backend/src/XGArcade.Api -- migrate-and-seed
        env:
          ConnectionStrings__Database: "Host=localhost;Database=xgarcade_e2e;Username=postgres;Password=postgres"
      - name: Start API (background)
        run: |
          # --no-launch-profile: launchSettings.json's applicationUrl (port
          # 5028) otherwise overrides ASPNETCORE_URLS below, so the API binds
          # to the wrong port and the health-wait loop times out.
          dotnet run --project backend/src/XGArcade.Api --configuration Release --no-launch-profile &
          timeout 60 bash -c 'until curl -sf http://localhost:8080/health; do sleep 2; done'
        env:
          ConnectionStrings__Database: "Host=localhost;Database=xgarcade_e2e;Username=postgres;Password=postgres"
          Auth__Mode: "local-e2e"   # bypasses Supabase JWT validation with a local test signer — never enabled outside Development
          ASPNETCORE_ENVIRONMENT: "Development"
          ASPNETCORE_URLS: "http://localhost:8080"
          Cors__AllowedOrigins: "http://localhost:5173"
      - name: E2E (Playwright against local stack)
        # playwright.config uses its `webServer` option to boot the Vite dev
        # server on :5173 itself — only the API needs manual starting above.
        # Dependencies/browser already installed above.
        working-directory: frontend
        run: npm run test:e2e
        env:
          E2E_BASE_URL: http://localhost:5173
          VITE_API_BASE_URL: http://localhost:8080
      - name: Publish E2E test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: E2E test results
          path: "frontend/test-results/e2e-junit.xml"
          reporter: java-junit
          use-actions-summary: false
